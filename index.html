                { id: 21, task_name: 'Reunión Ordinaria Mensual - Noviembre', month: 11, type: 'REUNION', status: 'PENDIENTE', responsible: 'Secretario CPHS' },
                { id: 22, task_name: 'Evaluación Anual de Desempeño y Cumplimiento', month: 12, type: 'AUDITORIA', status: 'PENDIENTE', responsible: 'Presidente CPHS' },
                { id: 23, task_name: 'Reunión Ordinaria Mensual - Diciembre', month: 12, type: 'REUNION', status: 'PENDIENTE', responsible: 'Secretario CPHS' }
            ]
        };

        function App() {
            // Navigation State (Mobile first Bottom Bar tabs)
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Entities States
            const [meetings, setMeetings] = useState(INITIAL_SEED_DATA.meetings);
            const [commitments, setCommitments] = useState(INITIAL_SEED_DATA.commitments);
            const [inspections, setInspections] = useState(INITIAL_SEED_DATA.inspections);
            const [findings, setFindings] = useState(INITIAL_SEED_DATA.findings);
            const [trainings, setTrainings] = useState(INITIAL_SEED_DATA.trainings);
            const [certificates, setCertificates] = useState(INITIAL_SEED_DATA.training_employees);
            const [accidents, setAccidents] = useState(INITIAL_SEED_DATA.accidents);
            const [annualPlan, setAnnualPlan] = useState(INITIAL_SEED_DATA.annual_plan);

            // Search / Selection states
            const [certSearchQuery, setCertSearchQuery] = useState('');
            const [selectedMeeting, setSelectedMeeting] = useState(null);
            const [selectedInspection, setSelectedInspection] = useState(null);
            const [selectedTraining, setSelectedTraining] = useState(null);
            const [selectedAccident, setSelectedAccident] = useState(null);
            const [activeCertificatePdf, setActiveCertificatePdf] = useState(null);

            // Modal / Form trigger states
            const [showMeetingModal, setShowMeetingModal] = useState(false);
            const [showInspectionModal, setShowInspectionModal] = useState(false);
            const [showFindingModal, setShowFindingModal] = useState(false);
            const [showTrainingModal, setShowTrainingModal] = useState(false);
            const [showAttendeeModal, setShowAttendeeModal] = useState(false);
            const [showAccidentModal, setShowAccidentModal] = useState(false);

            // Form Fields State
            const [meetingForm, setMeetingForm] = useState({ title: '', type: 'ORDINARIA', date: '', description: '', attendees: '' });
            const [commitmentForm, setCommitmentForm] = useState({ description: '', responsible_name: '', due_date: '' });
            const [inspectionForm, setInspectionForm] = useState({ title: '', planned_date: '', conducted_date: '', inspector_name: '' });
            const [findingForm, setFindingForm] = useState({ description: '', risk_level: 'MEDIO', due_date: '', corrective_measure: '' });
            const [trainingForm, setTrainingForm] = useState({ topic: '', planned_date: '', conducted_date: '', hours: 1 });
            const [attendeeForm, setAttendeeForm] = useState({ employee_name: '', employee_run: '', status: 'APROBADO' });
            const [accidentForm, setAccidentForm] = useState({
                employee_name: '', date: '', accident_type: 'LEVE', description: '',
                why1: '', why2: '', why3: '', why4: '', why5: '',
                measure1: '', measure1Date: '', measure2: '', measure2Date: ''
            });

            // LocalStorage sync
            useEffect(() => {
                const cached = localStorage.getItem('cphs_store_demo_v2');
                if (cached) {
                    const parsed = JSON.parse(cached);
                    setMeetings(parsed.meetings);
                    setCommitments(parsed.commitments);
                    setInspections(parsed.inspections);
                    setFindings(parsed.findings);
                    setTrainings(parsed.trainings);
                    setCertificates(parsed.training_employees || parsed.certificates);
                    setAccidents(parsed.accidents);
                    setAnnualPlan(parsed.annual_plan);
                }
            }, []);

            const triggerSaveState = (updatedFields) => {
                const currentStore = {
                    meetings: updatedFields.meetings || meetings,
                    commitments: updatedFields.commitments || commitments,
                    inspections: updatedFields.inspections || inspections,
                    findings: updatedFields.findings || findings,
                    trainings: updatedFields.trainings || trainings,
                    training_employees: updatedFields.certificates || certificates,
                    accidents: updatedFields.accidents || accidents,
                    annual_plan: updatedFields.annualPlan || annualPlan
                };
                localStorage.setItem('cphs_store_demo_v2', JSON.stringify(currentStore));
            };

            // METRICAS EN TIEMPO REAL
            const stats = useMemo(() => {
                const currentMonth = new Date().getMonth() + 1;
                
                const monthTasks = annualPlan.filter(t => t.month === currentMonth);
                const completedMonthTasks = monthTasks.filter(t => t.status === 'COMPLETADO');
                const complianceMonth = monthTasks.length > 0 ? Math.round((completedMonthTasks.length / monthTasks.length) * 100) : 0;

                const yearTasks = annualPlan.filter(t => t.month <= currentMonth);
                const completedYearTasks = yearTasks.filter(t => t.status === 'COMPLETADO');
                const complianceYear = yearTasks.length > 0 ? Math.round((completedYearTasks.length / yearTasks.length) * 100) : 0;

                const meetCom = meetings.filter(m => m.status === 'COMPLETADA').length;
                const inspCom = inspections.filter(i => i.status === 'COMPLETADA').length;
                const trainCom = trainings.filter(t => t.status === 'COMPLETADA').length;

                let totalHH = 0;
                trainings.forEach(t => {
                    if (t.status === 'COMPLETADA') {
                        const count = certificates.filter(c => c.training_id === t.id).length || t.attendee_count || 0;
                        totalHH += (t.hours * count);
                    }
                });

                const completedComs = commitments.filter(c => c.status === 'COMPLETADO').length;
                const totalComs = commitments.length;

                return {
                    complianceMonth,
                    complianceYear,
                    meetings: meetCom,
                    inspections: inspCom,
                    trainings: trainCom,
                    totalHoursHomme: totalHH,
                    commitments: { completed: completedComs, total: totalComs }
                };
            }, [meetings, commitments, inspections, trainings, certificates, annualPlan]);

            const alerts = useMemo(() => {
                const upcomingCommitments = commitments.filter(c => c.status === 'PENDIENTE').slice(0, 4);
                const criticalFindings = findings.filter(f => f.status === 'ABIERTO' && (f.risk_level === 'CRITICO' || f.risk_level === 'ALTO'));
                return { upcomingCommitments, criticalFindings };
            }, [commitments, findings]);

            const filteredCertificates = useMemo(() => {
                if (!certSearchQuery) return certificates;
                const q = certSearchQuery.toLowerCase();
                return certificates.filter(c => 
                    c.employee_name.toLowerCase().includes(q) || 
                    c.employee_run.toLowerCase().includes(q) ||
                    (c.training_topic && c.training_topic.toLowerCase().includes(q))
                );
            }, [certificates, certSearchQuery]);

            // ACCIONES
            const toggleAnnualTask = (taskId) => {
                const updatedPlan = annualPlan.map(t => {
                    if (t.id === taskId) return { ...t, status: t.status === 'COMPLETADO' ? 'PENDIENTE' : 'COMPLETADO' };
                    return t;
                });
                setAnnualPlan(updatedPlan);
                triggerSaveState({ annualPlan: updatedPlan });
            };

            const toggleCommitment = (comId) => {
                const updatedCommitments = commitments.map(c => {
                    if (c.id === comId) {
                        const nextStatus = c.status === 'COMPLETADO' ? 'PENDIENTE' : 'COMPLETADO';
                        return { 
                            ...c, status: nextStatus,
                            closed_at: nextStatus === 'COMPLETADO' ? new Date().toISOString().split('T')[0] : null
                        };
                    }
                    return c;
                });
                setCommitments(updatedCommitments);
                triggerSaveState({ commitments: updatedCommitments });
            };

            const handleCreateMeeting = (e) => {
                e.preventDefault();
                const newId = meetings.length + 1;
                const newMeeting = {
                    id: newId,
                    title: meetingForm.title,
                    type: meetingForm.type,
                    date: meetingForm.date,
                    description: meetingForm.description,
                    attendees: meetingForm.attendees ? meetingForm.attendees.split(',').map(a => a.trim()) : [],
                    act_file_path: 'uploads/acta_mensual.pdf',
                    status: 'COMPLETADA'
                };

                const updatedMeetings = [newMeeting, ...meetings];
                setMeetings(updatedMeetings);

                let updatedCommitments = [...commitments];
                if (meetingForm.title) {
                    const initialCommitment = {
                        id: commitments.length + 1,
                        meeting_id: newId,
                        description: `Presentar acuerdos de la sesión: ${meetingForm.title}`,
                        responsible_name: 'Secretario CPHS',
                        due_date: new Date(Date.now() + 10*24*60*60*1000).toISOString().split('T')[0],
                        status: 'PENDIENTE',
                        closed_at: null
                    };
                    updatedCommitments = [initialCommitment, ...commitments];
                    setCommitments(updatedCommitments);
                }

                triggerSaveState({ meetings: updatedMeetings, commitments: updatedCommitments });
                setMeetingForm({ title: '', type: 'ORDINARIA', date: '', description: '', attendees: '' });
                setShowMeetingModal(false);
                setSelectedMeeting(newMeeting);
            };

            const handleCreateInspection = (e) => {
                e.preventDefault();
                const newId = inspections.length + 1;
                const newInsp = {
                    id: newId,
                    title: inspectionForm.title,
                    planned_date: inspectionForm.planned_date,
                    conducted_date: inspectionForm.conducted_date || null,
                    inspector_name: inspectionForm.inspector_name,
                    report_file_path: inspectionForm.conducted_date ? 'mock_report.pdf' : null,
                    status: inspectionForm.conducted_date ? 'COMPLETADA' : 'PENDIENTE'
                };

                const updatedInsps = [newInsp, ...inspections];
                setInspections(updatedInsps);
                triggerSaveState({ inspections: updatedInsps });
                setInspectionForm({ title: '', planned_date: '', conducted_date: '', inspector_name: '' });
                setShowInspectionModal(false);
                setSelectedInspection(newInsp);
            };

            const handleCreateFinding = (e) => {
                e.preventDefault();
                if (!selectedInspection) return;

                const newId = findings.length + 1;
                const newFinding = {
                    id: newId,
                    inspection_id: selectedInspection.id,
                    description: findingForm.description,
                    risk_level: findingForm.risk_level,
                    corrective_measure: findingForm.corrective_measure,
                    due_date: findingForm.due_date,
                    status: 'ABIERTO',
                    evidence_file_path: 'mock_evidence.jpg',
                    closed_at: null
                };

                const updatedFindings = [newFinding, ...findings];
                setFindings(updatedFindings);
                triggerSaveState({ findings: updatedFindings });
                setFindingForm({ description: '', risk_level: 'MEDIO', due_date: '', corrective_measure: '' });
                setShowFindingModal(false);
            };

            const handleCloseFinding = (findingId) => {
                const updatedFindings = findings.map(f => {
                    if (f.id === findingId) return { ...f, status: 'CERRADO', closed_at: new Date().toISOString().split('T')[0] };
                    return f;
                });
                setFindings(updatedFindings);
                triggerSaveState({ findings: updatedFindings });
            };

            const handleCreateTraining = (e) => {
                e.preventDefault();
                const newId = trainings.length + 1;
                const newTraining = {
                    id: newId,
                    topic: trainingForm.topic,
                    planned_date: trainingForm.planned_date,
                    conducted_date: trainingForm.conducted_date || null,
                    hours: Number(trainingForm.hours),
                    attendee_count: 0,
                    status: trainingForm.conducted_date ? 'COMPLETADA' : 'PENDIENTE',
                    attendance_list_file_path: 'mock_asist.pdf',
                    photo_file_path: 'mock_photo.jpg',
                    material_file_path: null
                };

                const updatedTrainings = [newTraining, ...trainings];
                setTrainings(updatedTrainings);
                triggerSaveState({ trainings: updatedTrainings });
                setTrainingForm({ topic: '', planned_date: '', conducted_date: '', hours: 1 });
                setShowTrainingModal(false);
                setSelectedTraining(newTraining);
            };

            const handleAddAttendee = (e) => {
                e.preventDefault();
                if (!selectedTraining) return;

                const newId = certificates.length + 1;
                const newCert = {
                    id: newId,
                    training_id: selectedTraining.id,
                    employee_name: attendeeForm.employee_name,
                    employee_run: attendeeForm.employee_run,
                    certificate_file_path: 'mock_cert.pdf',
                    status: attendeeForm.status,
                    training_topic: selectedTraining.topic,
                    training_date: selectedTraining.conducted_date || new Date().toISOString().split('T')[0]
                };

                const updatedCerts = [newCert, ...certificates];
                setCertificates(updatedCerts);

                const updatedTrainings = trainings.map(t => {
                    if (t.id === selectedTraining.id) return { ...t, attendee_count: (t.attendee_count || 0) + 1 };
                    return t;
                });
                setTrainings(updatedTrainings);

                triggerSaveState({ certificates: updatedCerts, trainings: updatedTrainings });
                setAttendeeForm({ employee_name: '', employee_run: '', status: 'APROBADO' });
                setShowAttendeeModal(false);
            };

            const handleCreateAccident = (e) => {
                e.preventDefault();
                const newId = accidents.length + 1;
                
                const whyAnalysis = [
                    accidentForm.why1, accidentForm.why2, accidentForm.why3, accidentForm.why4, accidentForm.why5
                ].filter(Boolean);

                const correctiveActions = [];
                if (accidentForm.measure1) {
                    correctiveActions.push({ 
                        measure: accidentForm.measure1, 
                        due_date: accidentForm.measure1Date || '2026-06-30', 
                        status: 'PENDIENTE', date_closed: null 
                    });
                }

                const newAcc = {
                    id: newId,
                    employee_name: accidentForm.employee_name,
                    date: accidentForm.date,
                    accident_type: accidentForm.accident_type,
                    description: accidentForm.description,
                    root_cause_method: '5_WHYS',
                    root_cause_analysis: whyAnalysis,
                    corrective_measures: correctiveActions,
                    status: 'ABIERTO'
                };

                const updatedAccs = [newAcc, ...accidents];
                setAccidents(updatedAccs);

                const eventMonth = new Date(accidentForm.date).getMonth() + 1;
                const newTask = {
                    id: annualPlan.length + 1,
                    task_name: `Investigación Accidente: ${accidentForm.employee_name}`,
                    month: eventMonth || 5,
                    type: 'AUDITORIA',
                    status: 'COMPLETADO',
                    responsible: 'Comité Paritario'
                };
                const updatedPlan = [...annualPlan, newTask];
                setAnnualPlan(updatedPlan);

                triggerSaveState({ accidents: updatedAccs, annualPlan: updatedPlan });
                setAccidentForm({
                    employee_name: '', date: '', accident_type: 'LEVE', description: '',
                    why1: '', why2: '', why3: '', why4: '', why5: '',
                    measure1: '', measure1Date: '', measure2: '', measure2Date: ''
                });
                setShowAccidentModal(false);
                setSelectedAccident(newAcc);
            };

            const toggleAccidentMeasure = (accId, measureIndex) => {
                const updatedAccidents = accidents.map(a => {
                    if (a.id === accId) {
                        const nextMeasures = a.corrective_measures.map((m, idx) => {
                            if (idx === measureIndex) {
                                const nextStatus = m.status === 'COMPLETADA' ? 'PENDIENTE' : 'COMPLETADA';
                                return {
                                    ...m, status: nextStatus,
                                    date_closed: nextStatus === 'COMPLETADA' ? new Date().toISOString().split('T')[0] : null
                                };
                            }
                            return m;
                        });
                        
                        const allClosed = nextMeasures.every(m => m.status === 'COMPLETADA');
                        return {
                            ...a, corrective_measures: nextMeasures,
                            status: allClosed ? 'CERRADO' : 'ABIERTO'
                        };
                    }
                    return a;
                });

                setAccidents(updatedAccidents);
                triggerSaveState({ accidents: updatedAccidents });
                
                if (selectedAccident && selectedAccident.id === accId) {
                    setSelectedAccident(updatedAccidents.find(a => a.id === accId));
                }
            };

            return (
                <div className="flex flex-col min-h-screen bg-[#020617] text-slate-100 font-sans pb-24">
                    
                    {/* APP HEADER */}
                    <header className="h-16 border-b border-slate-800/80 bg-[#070b19]/80 backdrop-blur-md px-6 flex items-center justify-between shrink-0 sticky top-0 z-40">
                        <div className="flex items-center space-x-2.5">
                            <div className="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-400 border border-emerald-500/20">
                                <Icon name="shield" className="w-5 h-5" />
                            </div>
                            <div>
                                <h1 className="font-extrabold text-sm tracking-tight text-white font-sans">CPHS Móvil</h1>
                                <span className="text-[9px] font-bold text-emerald-400 uppercase tracking-widest block">Cumplimiento Paritario</span>
                            </div>
                        </div>
                        
                        <div className="flex items-center space-x-2">
                            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider font-sans">192.168.1.169</span>
                        </div>
                    </header>

                    {/* CONTENT AREA */}
                    <div className="p-5 flex-1 space-y-6">
                        
                        {/* =========================================================
                            MOBILE TAB: DASHBOARD
                            ========================================================= */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                {/* Title bar */}
                                <div>
                                    <h2 className="text-2xl font-extrabold text-white tracking-tight font-sans">Panel de Control</h2>
                                    <p className="text-xs text-slate-400 mt-0.5">Control de cumplimiento general del CPHS.</p>
                                </div>

                                {/* Compact 2-column KPI Grid */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-card rounded-2xl p-4 flex items-center justify-between col-span-2">
                                        <div>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Cumplimiento del Mes</span>
                                            <span className="text-2xl font-extrabold text-white mt-1 block font-sans">{stats.complianceMonth}%</span>
                                        </div>
                                        <div className="relative w-14 h-14 flex items-center justify-center shrink-0">
                                            <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                <path className="text-slate-800" strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                <path className="text-emerald-400 transition-all" strokeWidth="4" strokeDasharray={`${stats.complianceMonth}, 100`} strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                            </svg>
                                            <span className="absolute text-[10px] font-extrabold text-white font-sans">{stats.complianceMonth}%</span>
                                        </div>
                                    </div>

                                    <div className="glass-card rounded-2xl p-4 flex items-center justify-between col-span-2">
                                        <div>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Cumplimiento del Año</span>
                                            <span className="text-2xl font-extrabold text-white mt-1 block font-sans">{stats.complianceYear}%</span>
                                        </div>
                                        <div className="relative w-14 h-14 flex items-center justify-center shrink-0">
                                            <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                <path className="text-slate-800" strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                <path className="text-cyan-400 transition-all" strokeWidth="4" strokeDasharray={`${stats.complianceYear}, 100`} strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                            </svg>
                                            <span className="absolute text-[10px] font-extrabold text-white font-sans">{stats.complianceYear}%</span>
                                        </div>
                                    </div>

                                    <div className="glass-card rounded-2xl p-4 flex items-center space-x-3">
                                        <div className="w-9 h-9 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 shrink-0">
                                            <Icon name="checkcircle" className="w-5 h-5" />
                                        </div>
                                        <div>
                                            <span className="text-[9px] font-bold text-slate-400 uppercase block tracking-wider">Compromisos</span>
                                            <span className="text-sm font-extrabold text-white font-sans">{stats.commitments.completed} / {stats.commitments.total}</span>
                                        </div>
                                    </div>

                                    <div className="glass-card rounded-2xl p-4 flex items-center space-x-3">
                                        <div className="w-9 h-9 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 shrink-0">
                                            <Icon name="graduation" className="w-5 h-5" />
                                        </div>
                                        <div>
                                            <span className="text-[9px] font-bold text-slate-400 uppercase block tracking-wider">Capacitaciones</span>
                                            <span className="text-sm font-extrabold text-white font-sans">{stats.totalHoursHomme} HH</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Active Alerts (Mobile friendly list) */}
                                <div className="glass-card rounded-2xl p-5 space-y-4">
                                    <div className="flex items-center space-x-2 border-b border-slate-800/80 pb-3">
                                        <Icon name="alert" className="w-4 h-4 text-amber-500" />
                                        <h3 className="text-sm font-bold text-white">Alertas de Cumplimiento</h3>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {alerts.criticalFindings.length === 0 && alerts.upcomingCommitments.length === 0 && (
                                            <p className="text-[11px] text-slate-500 italic text-center py-2">No hay alertas activas en tu sector.</p>
                                        )}

                                        {alerts.criticalFindings.map(f => (
                                            <div key={f.id} className="p-3.5 rounded-xl bg-rose-500/5 border border-rose-500/25 flex flex-col justify-between gap-2">
                                                <div className="flex items-center justify-between text-[9px] font-bold">
                                                    <span className="px-1.5 py-0.5 rounded bg-rose-500/20 text-rose-400">RIESGO CRÍTICO</span>
                                                    <span className="text-slate-500">Plazo: {f.due_date}</span>
                                                </div>
                                                <p className="text-xs font-semibold text-slate-200">{f.description}</p>
                                                <button 
                                                    onClick={() => handleCloseFinding(f.id)}
                                                    className="self-end text-[10px] text-rose-400 hover:text-rose-300 font-extrabold"
                                                >
                                                    Marcar Solucionado
                                                </button>
                                            </div>
                                        ))}

                                        {alerts.upcomingCommitments.map(c => (
                                            <div key={c.id} className="p-3.5 rounded-xl bg-amber-500/5 border border-amber-500/10 flex flex-col justify-between gap-2">
                                                <div className="flex items-center justify-between text-[9px] font-bold">
                                                    <span className="px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-400">COMPROMISO REUNIÓN</span>
                                                    <span className="text-slate-500">Límite: {c.due_date}</span>
                                                </div>
                                                <p className="text-xs font-semibold text-slate-200">{c.description}</p>
                                                <button 
                                                    onClick={() => toggleCommitment(c.id)}
                                                    className="self-end text-[10px] text-emerald-400 hover:text-emerald-300 font-extrabold"
                                                >
                                                    Marcar Resuelto
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* =========================================================
                            MOBILE TAB: MEETINGS (REUNIONES Y COMPROMISOS)
                            ========================================================= */}
                        {activeTab === 'meetings' && (
                            <div className="space-y-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <h2 className="text-2xl font-extrabold text-white tracking-tight">Reuniones</h2>
                                        <p className="text-xs text-slate-400">Actas y compromisos legales.</p>
                                    </div>
                                    <button 
                                        onClick={() => setShowMeetingModal(true)}
                                        className="btn-gradient p-2 rounded-xl"
                                    >
                                        <Icon name="plus" className="w-5 h-5" />
                                    </button>
                                </div>

                                {/* Stacked Meeting List */}

                                    className="absolute right-4 top-4 w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 border"
                                >
                                    <Icon name="x" className="w-3.5 h-3.5" />
                                </button>

                                <div className="text-center space-y-4 py-4 border-2 border-double border-slate-200 p-4 rounded-xl relative">
                                    <div className="w-12 h-12 rounded-full bg-emerald-50 border border-emerald-500 mx-auto flex items-center justify-center text-emerald-600">
                                        <Icon name="shield" className="w-6 h-6" />
                                    </div>

                                    <div className="space-y-1">
                                        <h2 className="font-extrabold text-sm tracking-wider text-slate-800 uppercase font-sans">CERTIFICADO ACREDITACIÓN</h2>
                                        <p className="text-[8px] tracking-widest text-emerald-600 font-bold uppercase font-sans">Comité Paritario Higiene y Seguridad</p>
                                    </div>

                                    <p className="text-[10px] text-slate-500 leading-relaxed">
                                        Se certifica bajo la normativa legal de seguridad de la compañía que:
                                    </p>

                                    <div className="space-y-0.5">
                                        <h3 className="text-lg font-bold text-slate-900 font-sans">{activeCertificatePdf.employee_name}</h3>
                                        <p className="text-[10px] font-semibold text-slate-400 font-sans">RUN: {activeCertificatePdf.employee_run}</p>
                                    </div>

                                    <p className="text-[10px] text-slate-500">
                                        Ha aprobado y completado el curso:
                                    </p>

                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-150 inline-block w-full">
                                        <h4 className="font-bold text-xs text-slate-800 leading-snug">{activeCertificatePdf.training_topic}</h4>
                                        <p className="text-[8px] text-slate-400 font-semibold mt-1 font-sans">Fecha de Acreditación: {activeCertificatePdf.training_date}</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 pt-4">
                                        <div className="text-center border-t border-slate-200 pt-1.5">
                                            <span className="text-[8px] font-bold text-slate-500 uppercase block font-sans">Firma Presidente</span>
                                        </div>
                                        <div className="text-center border-t border-slate-200 pt-1.5">
                                            <span className="text-[8px] font-bold text-slate-500 uppercase block font-sans">Firma Asesor Prev.</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex space-x-2.5 justify-end">
                                    <button 
                                        onClick={() => setActiveCertificatePdf(null)}
                                        className="px-3.5 py-2 rounded-xl bg-slate-100 text-slate-700 text-xs font-bold transition-all flex-1"
                                    >
                                        Cerrar
                                    </button>
                                    <button 
                                        onClick={() => window.print()}
                                        className="px-3.5 py-2 rounded-xl bg-emerald-500 text-white text-xs font-bold transition-all shadow flex items-center justify-center space-x-1.5 flex-1"
                                    >
                                        <Icon name="download" className="w-4 h-4" />
                                        <span>Imprimir</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Mount the React Application
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
